<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table question</title>
</head>
<body>
    <table border="1">
    <caption>가격표</caption>
    <thead>
        <col style="width: 80px;">
        <colgroup span="2" style="width: 150px;"> </colgroup>
        <col style="width: 100px;">
    <tr>
        <th>번호</th>
        <th>상품명</th>
        <th>수량</th>
        <th>가격</th>
    </tr>
    </thead>
    <tfoot>
    <tr>
        <td>총 금액</td>
        <td colspan="3">6,500원</td>
    </tr>
    </tfoot>
    <tbody>
    <tr>
        <td>1</td>
        <td>콜라</td>
        <td>1개</td>
        <td>1,500원</td>
    </tr>
    <tr>
        <td>2</td>
        <td>사이다</td>
        <td>2개</td>
        <td rowspan="2">1,000원</td>
    </tr>
    <tr>
        <td>3</td>
        <td>탄산수</td>
        <td>3개</td>
    </tr>
    </tbody>
</table>
    <br>
<table border="1">
    <caption>성적표</caption>
    <tr>
        <th scope="col">구분</th>
        <th scope="col">중간고사</th>
        <th scope="col">기말고사</th>
    </tr>
    <tr>
        <th scope="row">전공</th>
        <td>A+</td>
        <td>B+</td>
    </tr>
    <tr>
        <TH scope="row">교양</TH>
        <td>C-</td>
        <td>B</td>
    </tr>
</table>
</body>
</html>
