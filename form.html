<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <form action="#" method="get">
        <input type="text">
        <input type="password">
        <input type="tel">
        <input type="number">
        <input type="url">
        <input type="search">
        <input type="email">
        <input type="checkbox">
        <input type="radio">
        <input type="file">
        <input type="button">
        <input type="image" src="facebook.png">
        <input type="hidden">
        <input type="date">
        <input type="datetime-local">
        <input type="month">
        <input type="week">
        <input type="time">
        <input type="range">
        <input type="color">
        <input type="submit">
        <input type="reset">
    <br>
    </form>
    <form>
        <fieldset>
            
            <legend>기본 정보</legend>
            <p>
            <label for="id">아이디</label>
            <input type="text" id="id">
            </p>
            <p>
                <label>비밀번호 <input type="password"></label>
            </p>
        </fieldset>
        <fieldset>
            <legend>선택 정보</legend>
            <p>
                <label for="age">나이</label>
                <input type="number" id="age">
            </p>
            <p>
                <label for="recommender">추천인</label>
                <input type="text" id="recommender">
            </p>
        </fieldset>
    </form>

    <form action="#" method="post">
        <fieldset>
            <legend>블로그 글쓰기  </legend>
            <p>
                <label for="title">제목
                    <input type="text" id="title" name="title">
                </label>
            </p>
            <p>
                <label for="desc">내용
                    <textarea id="desc" name="desc"></textarea>
                </label>
            </p>
        </fieldset>
    </form>

    <form action="#" method="post">
        <fieldset>
            <legend>개인 정보 입력</legend>
            
                <label for="city">지역                </label>
        <select name="city" id="city" >
            <optgroup label="서울시" >
                <option value="강북구">강북구</option>
                <option value="강남구">강남구</option>
                <option value="서초구" selected>서초구</option>
                </optgroup>
            <optgroup label="경기도 성남시">
                <option value="중원구">중원구</option>
                <option value="분당구">분당구</option>
            </optgroup>
        </select>
        <input type="submit" value="등록">
        </fieldset>
    </form>

    <button type="submit">
        <img src="facebook.png" alt="페이스북 버튼">
        페이스북에 등록하기
    </button>

    <input type="text" disabled>
    <button type="button" disabled>비활성</button>

    <input type="password" readonly>
    <textarea readonly></textarea>

    <input type="url" maxlength="4">
    <textarea maxlength="4"></textarea>

    <fieldset>
        <legend>좋아하는 과일</legend>
        <input type="checkbox" id="banana" name="banana" value="banana">
        <label for="banana">banana</label><br>
        <input type="checkbox" id="apple" name="apple" value="apple">
        <label for="apple">apple</label><br>
        <input type="checkbox" id="orange" name="orange" value="orange">
        <label for="orange">orange</label><br>
    </fieldset>
    
    <input type="tel" placeholder="전화번호를 입력해주세요.">
</body>
</html>
